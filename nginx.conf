# clankfights — static site served under /clankerfights/ on livefromfuturehell.com.
# Apache strips the /clankerfights/ prefix before proxying here, so the container
# serves at root. The app uses RELATIVE asset paths (style.css, assets/…), so we
# inject a <base> tag at the nginx layer to anchor them under the public prefix.
# Keeping this out of index.html means the source stays portable for the future
# dedicated (sub)domain — just drop this server-side injection then.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Inject <base> so relative URLs resolve under the public path prefix.
    sub_filter '<head>' '<head><base href="/clankerfights/">';
    sub_filter_once on;
    # sub_filter only rewrites text/html by default; make sure it's not skipped
    # for the proxied/gzipped case.
    sub_filter_types text/html;

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
